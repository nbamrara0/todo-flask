<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>MY TODO</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>

        body{
            font-family: 'Poppins', sans-serif;
            background: #f4f7fc;
        }

        /* Navbar */
        .navbar{
            background: linear-gradient(90deg,#141e30,#243b55);
            padding: 15px;
        }

        .navbar-brand,
        .nav-link{
            color: white !important;
            font-weight: 500;
        }

        /* Main Card */
        .todo-card{
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-top: 40px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        h1{
            font-weight: 600;
            margin-bottom: 20px;
        }

        /* Input */
        .form-control{
            border-radius: 10px;
            padding: 12px;
        }

        /* Buttons */
        .btn-custom{
            background: #243b55;
            color: white;
            border-radius: 10px;
            padding: 10px 20px;
            transition: 0.3s;
        }

        .btn-custom:hover{
            background: #141e30;
            color: white;
        }

        /* Table */
        .table{
            margin-top: 20px;
            border-radius: 10px;
            overflow: hidden;
        }

        .table thead{
            background: #243b55;
            color: white;
        }

        .table tbody tr:hover{
            background: #f1f1f1;
        }

        /* Action Buttons */
        .btn-update{
            background: #0d6efd;
            color: white;
            border: none;
        }

        .btn-delete{
            background: #dc3545;
            color: white;
            border: none;
        }

        .btn-update:hover{
            background: #0b5ed7;
        }

        .btn-delete:hover{
            background: #bb2d3b;
        }

    </style>
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">MY TODO</a>

        <button class="navbar-toggler bg-light" type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent">

            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarSupportedContent">

            <ul class="navbar-nav me-auto mb-2 mb-lg-0">

                <li class="nav-item">
                    <a class="nav-link active" href="#">Home</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="#">About</a>
                </li>

            </ul>

            <form class="d-flex">
                <input class="form-control me-2"
                       type="search"
                       placeholder="Search">

                <button class="btn btn-light" type="submit">
                    Search
                </button>
            </form>

        </div>
    </div>
</nav>

<!-- Add Todo -->
<div class="container">

    <div class="todo-card">

        <h1>Add Your Todo</h1>

        <form action="/" method="post">

            <div class="mb-3">

                <label for="title" class="form-label">
                    Todo Title
                </label>

                <input type="text"
                       class="form-control"
                       name="title"
                       id="title"
                       required>

            </div>

            <div class="mb-3">

                <label for="desc" class="form-label">
                    Todo Description
                </label>

                <input type="text"
                       class="form-control"
                       name="desc"
                       id="desc"
                       required>

            </div>

            <button type="submit" class="btn btn-custom">
                Add Todo
            </button>

        </form>

    </div>

</div>

<!-- Todo Table -->
<div class="container my-5">

    <div class="todo-card">

        <h1>Your Todos</h1>

        {% if allTodo|length == 0 %}

        <div class="alert alert-dark text-center">
            No Todos Found. Add your first Todo 🚀
        </div>

        {% else %}

        <div class="table-responsive">

            <table class="table table-bordered align-middle">

                <thead>

                <tr>
                    <th>SNo</th>
                    <th>Title</th>
                    <th>Description</th>
                    <th>Time</th>
                    <th>Actions</th>
                </tr>

                </thead>

                <tbody>

                {% for todo in allTodo %}

                <tr>

                    <td>{{ loop.index }}</td>
                    <td>{{ todo.title }}</td>
                    <td>{{ todo.desc }}</td>
                    <td>{{ todo.date_created }}</td>

                    <td>

                        <a href="/update/{{todo.SNo}}">
                            <button class="btn btn-update btn-sm">
                                Update
                            </button>
                        </a>

                        <a href="/delete/{{todo.SNo}}">
                            <button class="btn btn-delete btn-sm">
                                Delete
                            </button>
                        </a>

                    </td>

                </tr>

                {% endfor %}

                </tbody>

            </table>

        </div>

        {% endif %}

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
